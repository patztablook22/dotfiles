# If a config.py file exists, this file is ignored unless it's explicitly loaded
# via config.load_autoconfig(). For more information, see:
# https://github.com/qutebrowser/qutebrowser/blob/main/doc/help/configuring.asciidoc#loading-autoconfigyml
# DO NOT edit this file by hand, qutebrowser will overwrite it.
# Instead, create a config.py - see :help for details.

config_version: 2
settings:
  auto_save.session:
    global: true
  bindings.commands:
    global:
      passthrough:
        <Ctrl+e>: mode-leave
  changelog_after_upgrade:
    global: major
  colors.completion.category.bg:
    global: rgba(0,0,0,50%)
  colors.completion.category.border.top:
    global: black
  colors.completion.category.fg:
    global: '#cacaca'
  colors.completion.even.bg:
    global: rgba(0,0,0,80%)
  colors.completion.item.selected.bg:
    global: '#333333'
  colors.completion.item.selected.fg:
    global: white
  colors.completion.odd.bg:
    global: rgba(0,0,0,0%)
  colors.completion.scrollbar.bg:
    global: rgba(90, 90, 90, 40%)
  colors.completion.scrollbar.fg:
    global: rgba(90, 90, 90, 40%)
  colors.contextmenu.disabled.bg:
    global: rgba(0, 0, 0, 50%)
  colors.contextmenu.disabled.fg:
    global: '#aaaaaa'
  colors.contextmenu.menu.bg:
    global: rgba(0, 0, 0, 50%)
  colors.contextmenu.menu.fg:
    global: white
  colors.contextmenu.selected.bg:
    global: '#444444'
  colors.downloads.bar.bg:
    global: rgba(0, 0, 0, 50%)
  colors.downloads.error.bg:
    global: rgba(0, 0, 0, 50%)
  colors.downloads.error.fg:
    global: red
  colors.downloads.start.bg:
    global: rgba(0, 0, 0, 50%)
  colors.downloads.start.fg:
    global: '#0000aa'
  colors.downloads.stop.bg:
    global: black
  colors.downloads.stop.fg:
    global: '#00ff00'
  colors.hints.bg:
    global: rgba(0, 255, 0, 50%)
  colors.hints.fg:
    global: black
  colors.hints.match.fg:
    global: green
  colors.messages.error.bg:
    global: black
  colors.messages.error.border:
    global: black
  colors.messages.error.fg:
    global: red
  colors.prompts.bg:
    global: rgba(0,0,0,50%)
  colors.prompts.border:
    global: 0px solid gray
  colors.statusbar.caret.bg:
    global: rgba(0,0,0,80%)
  colors.statusbar.command.bg:
    global: rgba(0,0,0,80%)
  colors.statusbar.insert.bg:
    global: rgba(0,0,0,80%)
  colors.statusbar.insert.fg:
    global: white
  colors.statusbar.normal.bg:
    global: rgba(0,0,0,80%)
  colors.statusbar.passthrough.bg:
    global: rgba(0,0,0,80%)
  colors.statusbar.private.bg:
    global: rgba(50,50,50,80%)
  colors.statusbar.progress.bg:
    global: '#00ff00'
  colors.tabs.bar.bg:
    global: rgba(0, 0, 0, 70%)
  colors.tabs.even.bg:
    global: rgba(0, 0, 0, 0%)
  colors.tabs.odd.bg:
    global: rgba(0, 0, 0, 0%)
  colors.tabs.selected.even.bg:
    global: rgba(0,0,0,0%)
  colors.tabs.selected.even.fg:
    global: '#00ff00'
  colors.tabs.selected.odd.bg:
    global: rgba(0,0,0,0%)
  colors.tabs.selected.odd.fg:
    global: '#00ff00'
  colors.webpage.bg:
    global: null
  colors.webpage.darkmode.algorithm:
    global: lightness-cielab
  colors.webpage.darkmode.contrast:
    global: 0.5
  colors.webpage.darkmode.enabled:
    global: false
  colors.webpage.darkmode.policy.images:
    global: smart
  colors.webpage.darkmode.threshold.foreground:
    global: 256
  colors.webpage.preferred_color_scheme:
    global: dark
  completion.height:
    global: 61%
  content.blocking.adblock.lists:
    global:
    - https://easylist.to/easylist/easylist.txt
    - https://easylist.to/easylist/easyprivacy.txt
    - https://www.nytimes.com/vi-assets/static-assets/main*
  content.blocking.enabled:
    global: false
  content.blocking.method:
    global: adblock
  content.geolocation:
    https://www.google.com: true
  content.javascript.can_open_tabs_automatically:
    global: true
  content.javascript.clipboard:
    global: access
  content.javascript.enabled:
    global: true
  content.media.audio_capture:
    http://localhost:5173: true
    http://localhost:8080: true
    https://discord.com: true
    https://hydra.ojack.xyz: true
    https://meet.google.com: true
    https://patz.cz: true
    https://www.facebook.com: true
  content.media.audio_video_capture:
    https://meet.google.com: true
  content.media.video_capture:
    https://meet.google.com: true
    https://www.facebook.com: true
  content.notifications.enabled:
    https://app.tuta.com: true
    https://calendar.google.com: true
    https://mail.google.com: true
    https://mail.tutanota.com: true
    https://meet.google.com: true
    https://www.facebook.com: true
    https://www.instagram.com: true
    https://www.netflix.com: false
    https://www.reddit.com: true
  content.pdfjs:
    global: true
  content.register_protocol_handler:
    https://app.tuta.com#url=%25s: true
    https://calendar.google.com?cid=%25s: true
    https://mail.google.com?extsrc=mailto&url=%25s: true
    https://mail.tutanota.com#url=%25s: false
  content.webgl:
    global: true
  downloads.position:
    global: bottom
  downloads.remove_finished:
    global: 5000
  editor.command:
    global:
    - gvim
    - -f
    - '{file}'
    - -c
    - normal {line}G{column0}l
  fonts.completion.category:
    global: default_size Inconsolata
  fonts.completion.entry:
    global: default_size Inconsolata
  fonts.contextmenu:
    global: null
  fonts.statusbar:
    global: default_size Inconsolata
  fonts.tabs.selected:
    global: default_size Inconsolata
  input.insert_mode.auto_enter:
    global: true
  input.insert_mode.auto_load:
    global: false
  input.insert_mode.plugins:
    global: false
  qt.force_software_rendering:
    global: none
  qt.highdpi:
    global: false
  scrolling.smooth:
    global: false
  statusbar.widgets:
    global:
    - keypress
    - url
    - progress
  tabs.favicons.scale:
    global: 1.0
  tabs.favicons.show:
    global: never
  tabs.indicator.width:
    global: 4
  tabs.max_width:
    global: 350
  tabs.mode_on_change:
    global: restore
  tabs.position:
    global: top
  tabs.title.format:
    global: '{audio}{index}: {current_title}'
  url.searchengines:
    global:
      DEFAULT: https://duckduckgo.com/?q={}
  window.hide_decoration:
    global: true
  window.transparent:
    global: true
