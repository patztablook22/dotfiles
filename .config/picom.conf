unredir-if-possible = false;
inactive-dim = 0.0;
frame-opacity = 0.0
popup_menu-opacity = 0.8
dropdown_menu-opacity = 0.8

opacity-rule = [
    "70:class_g = 'Alacritty'",
    "75:name *= 'DuckDuckGo'",
    "75:name *= 'Discord'",
    "75:name *= 'Spotify'",
    "75:name *= 'Messenger'",
    "80:name *= '.ipynb'",
    "80:name *= 'Jupyter'",
];

# Optional: blur the background behind terminal
blur-method = "kernel";
blur-strength = 3;

# Enable shadow behind windows
shadow = true;
